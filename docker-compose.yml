services:
  app:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    environment:
      - WHEATLEY_MODE=local
      - WHEATLEY_REPO_PATH=/repo
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./vitest.config.ts:/app/vitest.config.ts
      - ./package.json:/app/package.json
      - /app/node_modules
      - ${WHEATLEY_REPO_PATH:-.}:/repo:ro
