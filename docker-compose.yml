services:
  test:
    build:
      context: .
      target: development
    environment:
      - WHEATLEY_MODE=local
      - WHEATLEY_REPO_PATH=/repo
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - /app/node_modules
      - ${REPO_PATH:-.}:/repo:ro

  server:
    build:
      context: .
      target: development
    restart: on-failure:5
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      - WHEATLEY_MODE=${WHEATLEY_MODE:-local}
      - WHEATLEY_REPO_PATH=/repo
      # Push behavior: local mode defaults to commit-only (no push).
      # Set to 'true' to auto-push on every write (requires credentials below).
      # - WHEATLEY_PUSH_ON_WRITE=false
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_OWNER=${GITHUB_OWNER:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - /app/node_modules
      - ${REPO_PATH:-.}:/repo
      # For SSH-based remotes (when push is enabled), mount your SSH keys:
      # - ~/.ssh:/root/.ssh:ro
      # For GPG signing, mount the GPG agent:
      # - ${GNUPGHOME:-~/.gnupg}:/root/.gnupg:ro
    command: npx tsx watch src/server/index.ts

  frontend:
    build:
      context: .
      target: development
    restart: on-failure:5
    ports:
      - "5173:5173"
    environment:
      - WHEATLEY_API_URL=http://server:3000
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - /app/node_modules
    command: npx vite --host 0.0.0.0
